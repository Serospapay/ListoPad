
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЛистоПад | Книжкове видавництво</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Inter:wght@300..900&display=swap');
    
    :root {
      --app-bg: #0b0c10;
      --app-text: #e8e3d6;
      --accent-primary: #c7a76a;
      --transition-speed: 0.6s;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--app-bg);
      color: var(--app-text);
      transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), color var(--transition-speed) ease;
    }

    .font-serif-gothic {
      font-family: 'Cinzel', serif;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['Cinzel', 'ui-serif', 'Georgia', 'serif'],
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'gothic': '0 20px 80px -40px rgba(0,0,0,0.85)',
          },
        }
      }
    }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="theme-bg-transition">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
