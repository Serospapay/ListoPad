
<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ЛистоПад | Книжкове видавництво</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;700;900&display=swap');
    
    :root {
      --app-bg: #0c0a09;
      --app-text: #e7e5e4;
      --accent-primary: #78716c;
      --transition-speed: 0.6s;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--app-bg);
      color: var(--app-text);
      transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), color var(--transition-speed) ease;
    }

    .font-serif-gothic {
      font-family: 'Playfair Display', serif;
    }

    input[type=range] {
      appearance: none;
      background: none;
      pointer-events: none;
    }

    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      background: #ffffff;
      border: 2px solid var(--accent-primary);
      cursor: pointer;
      transition: transform 0.2s ease;
      pointer-events: auto;
      border-radius: 0;
    }

    input[type=range]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #ffffff;
      border: 2px solid var(--accent-primary);
      cursor: pointer;
      pointer-events: auto;
      border-radius: 0;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #44403c;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #57534e;
    }

    .theme-bg-transition {
      transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .hover-reveal-container:hover .reveal-item {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    
    .reveal-item {
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="theme-bg-transition">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
